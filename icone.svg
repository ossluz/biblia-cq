<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2c3e50" />
      <stop offset="100%" stop-color="#1a252f" />
    </linearGradient>
    
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f39c12" />
      <stop offset="100%" stop-color="#d35400" />
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="115" fill="url(#bg)"/>

  <path d="M256 160 C180 140 130 170 130 170 L130 400 C130 400 180 370 256 390 C332 370 382 400 382 400 L382 170 C382 170 332 140 256 160 Z" fill="none" stroke="url(#gold)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  
  <line x1="256" y1="160" x2="256" y2="390" stroke="url(#gold)" stroke-width="24" stroke-linecap="round" filter="url(#glow)"/>

  <text x="190" y="315" font-family="'Segoe UI', Arial, sans-serif" font-weight="900" font-size="110" fill="#ffffff" text-anchor="middle" filter="url(#glow)">C</text>
  <text x="325" y="315" font-family="'Segoe UI', Arial, sans-serif" font-weight="900" font-size="110" fill="#ffffff" text-anchor="middle" filter="url(#glow)">Q</text>

  <path d="M256 100 L270 130 L256 145 L242 130 Z" fill="#8e44ad" filter="url(#glow)"/>
